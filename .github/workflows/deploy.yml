name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: Force rebuild (ignore layer cache)
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  deploy:
    # Runs on the self-hosted runner container that lives on the Coolify host, so
    # it reaches Coolify at localhost with no Tailscale hop and nothing exposed
    # publicly. This runner is used ONLY by this push/dispatch-triggered job;
    # CI, CodeQL and the security audit stay on GitHub-hosted runners so a fork
    # pull request can never execute code on the server.
    runs-on: [self-hosted, coolify]
    timeout-minutes: 5
    steps:
      - name: Trigger Coolify deploy
        env:
          UUID: ${{ secrets.COOLIFY_UUID }}
          FORCE: ${{ inputs.force || false }}
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail
          echo "Deploying (force=${FORCE})"
          curl --fail-with-body --show-error --silent \
               --retry 3 --retry-delay 2 --retry-all-errors --max-time 30 \
               -X GET "http://localhost:8000/api/v1/deploy?uuid=${UUID}&force=${FORCE}" \
               -H "Authorization: Bearer ${TOKEN}" \
               -H "Accept: application/json"
          echo
          echo "Deploy request accepted."
