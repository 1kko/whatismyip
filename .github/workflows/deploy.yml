name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: Force rebuild (ignore layer cache)
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    uses: 1kko/ops_svc_coolify/.github/workflows/coolify-deploy.yml@main
    with:
      force: ${{ inputs.force || false }}
    secrets: inherit
