name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --only dev

      - name: Ruff lint (includes Bandit security rules)
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install
          # Upgrade venv pip so audit picks up the latest patched release
          # (pip-audit scans the venv's own pip too).
          poetry run pip install --upgrade pip

      - name: Audit dependencies for known vulnerabilities
        # No ignores: the pip CVEs (incl. CVE-2026-3219) are fixed in pip >= 26.1,
        # which the pip upgrade above pulls in. Keep this in sync with the
        # ignore-free weekly security-audit workflow.
        run: poetry run pip-audit
